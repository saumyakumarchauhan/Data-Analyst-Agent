<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TDS Data Analyst Agent</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#6C63FF;
  --accent2:#A78BFA;
  --surface:#0F0F1A;
  --card:#16162A;
  --card2:#1E1E38;
  --border:rgba(108,99,255,0.18);
  --border2:rgba(108,99,255,0.38);
  --text:#F0EEFF;
  --muted:#9B93C6;
  --glow:0 0 32px rgba(108,99,255,0.22);
  --glow2:0 0 60px rgba(108,99,255,0.15);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding:0}
.bg-mesh{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(167,139,250,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 60% 30%, rgba(124,58,237,0.07) 0%, transparent 70%);
}
.wrap{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:48px 24px 80px}
.hero{text-align:center;margin-bottom:52px}
.logo-ring{
  width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#6C63FF,#A78BFA);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
  box-shadow:0 0 0 12px rgba(108,99,255,0.08),0 0 0 24px rgba(108,99,255,0.04);
}
.logo-ring i{font-size:30px;color:#fff}
h1{font-size:2.1rem;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(90deg,#fff 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px}
.subtitle{color:var(--muted);font-size:1rem;line-height:1.6}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:36px;box-shadow:var(--glow2);margin-bottom:24px;
  transition:border-color .3s;
}
.card:hover{border-color:var(--border2)}
.section-label{
  font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--accent2);margin-bottom:20px;display:flex;align-items:center;gap:8px
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.upload-zone{
  border:1.5px dashed var(--border2);border-radius:14px;padding:28px 20px;
  background:var(--card2);cursor:pointer;transition:all .25s;
  text-align:center;position:relative;overflow:hidden;
}
.upload-zone::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;
  background:radial-gradient(ellipse at center,rgba(108,99,255,0.10) 0%,transparent 70%);
}
.upload-zone:hover::before,.upload-zone.active::before{opacity:1}
.upload-zone:hover,.upload-zone.active{
  border-color:var(--accent);background:#1a1a35;
  box-shadow:0 0 0 4px rgba(108,99,255,0.10),var(--glow);
}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uz-icon{
  width:44px;height:44px;border-radius:12px;background:rgba(108,99,255,0.14);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
  transition:transform .2s;
}
.upload-zone:hover .uz-icon{transform:translateY(-2px)}
.uz-icon i{font-size:22px;color:var(--accent2)}
.uz-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.uz-sub{font-size:12.5px;color:var(--muted)}
.file-pill{
  display:inline-flex;align-items:center;gap:8px;margin-top:14px;
  background:rgba(108,99,255,0.12);border:1px solid rgba(108,99,255,0.25);
  border-radius:100px;padding:6px 14px;font-size:12.5px;color:var(--accent2);display:none;
}
.file-pill i{font-size:15px}
.optional-badge{
  display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;padding:2px 8px;border-radius:100px;
  background:rgba(255,255,255,0.06);color:var(--muted);margin-left:8px;vertical-align:middle;
}
.divider{margin:28px 0;border:none;border-top:1px solid var(--border)}
.btn-row{display:flex;gap:12px;flex-wrap:wrap}
.btn{
  flex:1;min-width:140px;padding:15px 28px;border-radius:12px;font-size:15px;
  font-weight:700;cursor:pointer;border:none;transition:all .22s;
  display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:0.2px;
}
.btn-primary{
  background:linear-gradient(135deg,#6C63FF 0%,#9B8BFF 100%);color:#fff;
  box-shadow:0 4px 24px rgba(108,99,255,0.40);
}
.btn-primary:hover:not(:disabled){
  transform:translateY(-2px);box-shadow:0 8px 32px rgba(108,99,255,0.55);filter:brightness(1.08);
}
.btn-primary:active:not(:disabled){transform:translateY(0);filter:brightness(0.95)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.btn-ghost{
  background:transparent;color:var(--muted);
  border:1.5px solid var(--border2);flex:0 0 auto;
}
.btn-ghost:hover{background:rgba(255,255,255,0.04);color:var(--text);border-color:rgba(255,255,255,0.2)}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:40px;gap:16px;display:none}
.spinner{
  width:44px;height:44px;border-radius:50%;
  border:3px solid rgba(108,99,255,0.15);
  border-top:3px solid var(--accent2);
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-text{color:var(--muted);font-size:14px;letter-spacing:0.5px}
.results{display:none;margin-top:8px}
.results-header{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;
  font-size:18px;font-weight:700;color:var(--text);
}
.results-header i{font-size:22px;color:var(--accent2)}
.result-item{
  background:var(--card2);border:1px solid var(--border);border-radius:16px;
  padding:24px 26px;margin-bottom:16px;transition:border-color .2s;
  animation:fadeUp 0.35s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-item:hover{border-color:var(--border2)}
.result-item.error{border-color:rgba(239,68,68,0.35);background:rgba(239,68,68,0.04)}
.q-num{
  display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--accent2);margin-bottom:8px;
}
.q-text{font-size:15px;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.5}
.a-body{color:#C0BAE8;font-size:14.5px;line-height:1.7}
.a-body pre{
  background:#0a0a18;border:1px solid var(--border);border-radius:10px;
  padding:16px;overflow-x:auto;font-size:13px;color:#d4cfff;white-space:pre-wrap;margin-top:8px;
}
.a-body img{
  max-width:100%;border-radius:12px;margin-top:12px;cursor:zoom-in;
  transition:transform .25s,box-shadow .25s;border:1px solid var(--border2);display:block;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}
.a-body img:hover{transform:scale(1.015);box-shadow:0 8px 36px rgba(108,99,255,0.25)}
.overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(5,5,15,0.92);
  align-items:center;justify-content:center;cursor:zoom-out;
}
.overlay.open{display:flex}
.overlay img{max-width:90vw;max-height:90vh;border-radius:14px;object-fit:contain;box-shadow:0 20px 80px rgba(0,0,0,0.8)}
.close-btn{
  position:absolute;top:20px;right:24px;background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.12);border-radius:50%;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:all .2s;
}
.close-btn:hover{background:rgba(255,255,255,0.15)}
@media(max-width:600px){
  .wrap{padding:32px 16px 60px}
  h1{font-size:1.6rem}
  .card{padding:22px}
  .btn{padding:13px 18px;font-size:14px}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="wrap">
  <div class="hero">
    <div class="logo-ring"><i class="ti ti-brain" aria-hidden="true"></i></div>
    <h1>TDS Data Analyst Agent</h1>
    <p class="subtitle">Upload questions and datasets — get intelligent answers with visualizations, instantly.</p>
  </div>

  <div class="card">
    <div class="section-label"><i class="ti ti-file-text" aria-hidden="true"></i> Questions</div>
    <div class="upload-zone" id="qZone">
      <input type="file" id="qFile" accept=".txt"/>
      <div class="uz-icon"><i class="ti ti-upload" aria-hidden="true"></i></div>
      <div class="uz-title">Drop your questions file here</div>
      <div class="uz-sub">.txt format · Required</div>
    </div>
    <div class="file-pill" id="qPill"><i class="ti ti-file-check" aria-hidden="true"></i><span id="qPillText"></span></div>

    <hr class="divider"/>

    <div class="section-label">
      <i class="ti ti-database" aria-hidden="true"></i> Dataset
      <span class="optional-badge">Optional</span>
    </div>
    <div class="upload-zone" id="dZone">
      <input type="file" id="dFile" accept=".csv,.xlsx,.xls,.json,.parquet,.txt"/>
      <div class="uz-icon"><i class="ti ti-table" aria-hidden="true"></i></div>
      <div class="uz-title">Drop your dataset here</div>
      <div class="uz-sub">CSV, Excel, JSON, Parquet, TXT</div>
    </div>
    <div class="file-pill" id="dPill"><i class="ti ti-file-check" aria-hidden="true"></i><span id="dPillText"></span></div>

    <hr class="divider"/>

    <div class="btn-row">
      <button class="btn btn-primary" id="analyzeBtn" onclick="handleAnalyze()">
        <i class="ti ti-sparkles" aria-hidden="true"></i>
        Analyze Data
      </button>
      <button class="btn btn-ghost" onclick="handleClear()">
        <i class="ti ti-refresh" aria-hidden="true"></i> Clear
      </button>
    </div>
  </div>

  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner"></div>
    <p class="spin-text">Analyzing your data…</p>
  </div>

  <div class="results" id="results">
    <div class="results-header"><i class="ti ti-chart-dots" aria-hidden="true"></i> Analysis Results</div>
    <div id="resultsContent"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay(this)">
  <div class="close-btn" onclick="event.stopPropagation();closeOverlay(document.getElementById('overlay'))">
    <i class="ti ti-x" aria-hidden="true"></i>
  </div>
  <img id="overlayImg" src="" alt="Visualization preview"/>
</div>

<script>
const qFile=document.getElementById('qFile');
const dFile=document.getElementById('dFile');
const qZone=document.getElementById('qZone');
const dZone=document.getElementById('dZone');
const qPill=document.getElementById('qPill');
const dPill=document.getElementById('dPill');
const qPillText=document.getElementById('qPillText');
const dPillText=document.getElementById('dPillText');
const analyzeBtn=document.getElementById('analyzeBtn');
const spinnerWrap=document.getElementById('spinnerWrap');
const resultsEl=document.getElementById('results');
const resultsContent=document.getElementById('resultsContent');

function setFilePill(pill,text,file){
  text.textContent=file.name+' ('+Math.round(file.size/1024)+' KB)';
  pill.style.display='inline-flex';
}

qFile.addEventListener('change',()=>{if(qFile.files[0]){qZone.classList.add('active');setFilePill(qPill,qPillText,qFile.files[0])}});
dFile.addEventListener('change',()=>{if(dFile.files[0]){dZone.classList.add('active');setFilePill(dPill,dPillText,dFile.files[0])}});

function normalizeImage(answer){
  let s=typeof answer==='string'?answer.trim():(answer&&(answer.image||answer.base64||answer.plot||answer.data))||null;
  if(typeof s==='string')s=s.trim();if(!s)return null;
  s=s.replace(/^data:aimage\//i,'data:image/');
  if(/^data:image\//i.test(s))return s;
  if(/^[A-Za-z0-9+/=\r\n]+$/.test(s)&&s.length>200)return'data:image/png;base64,'+s;
  return null;
}

function renderAnswer(answer,container){
  const img=normalizeImage(answer);
  if(img){
    const el=document.createElement('img');
    el.src=img;el.alt='Visualization';
    el.onclick=()=>{document.getElementById('overlayImg').src=img;document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden'};
    container.appendChild(el);return;
  }
  const text=(answer&&typeof answer==='object')?JSON.stringify(answer,null,2):String(answer??'');
  if(text.includes('\n')||text.length>100){
    const pre=document.createElement('pre');pre.textContent=text;container.appendChild(pre);
  } else {container.textContent=text;}
}

async function handleAnalyze(){
  if(!qFile.files[0]){alert('Please upload your questions .txt file.');return;}
  analyzeBtn.disabled=true;analyzeBtn.innerHTML='<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Analyzing…';
  spinnerWrap.style.display='flex';resultsEl.style.display='none';

  try{
    const fd=new FormData();
    fd.append('questions_file',qFile.files[0]);
    if(dFile.files[0])fd.append('data_file',dFile.files[0]);
    const res=await fetch('/api',{method:'POST',body:fd});
    if(!res.ok){let m=`HTTP ${res.status}`;try{const e=await res.json();if(e.detail)m=e.detail;}catch{}throw new Error(m);}
    const data=await res.json();
    displayResults(data);
  } catch(err){displayError(err.message||'Unknown error');}
  finally{
    spinnerWrap.style.display='none';
    analyzeBtn.disabled=false;
    analyzeBtn.innerHTML='<i class="ti ti-sparkles"></i> Analyze Data';
  }
}

function displayResults(data){
  resultsContent.innerHTML='';
  if(data.error){displayError(data.error);return;}
  let i=0;
  Object.entries(data).forEach(([q,a])=>{
    i++;
    const item=document.createElement('div');item.className='result-item';
    item.innerHTML=`<div class="q-num">Question ${i}</div><div class="q-text">${escHtml(q)}</div>`;
    const aDiv=document.createElement('div');aDiv.className='a-body';
    renderAnswer(a,aDiv);item.appendChild(aDiv);
    resultsContent.appendChild(item);
  });
  resultsEl.style.display='block';
  setTimeout(()=>resultsEl.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function displayError(msg){
  resultsContent.innerHTML='';
  const item=document.createElement('div');item.className='result-item error';
  item.innerHTML=`<div class="q-text" style="color:#f87171"><i class="ti ti-alert-circle" aria-hidden="true" style="margin-right:6px"></i>Error</div><div class="a-body">${escHtml(msg)}</div>`;
  resultsContent.appendChild(item);
  resultsEl.style.display='block';
  setTimeout(()=>resultsEl.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function handleClear(){
  qFile.value='';dFile.value='';
  qPill.style.display='none';dPill.style.display='none';
  qZone.classList.remove('active');dZone.classList.remove('active');
  resultsEl.style.display='none';resultsContent.innerHTML='';
}

function closeOverlay(el){el.classList.remove('open');document.body.style.overflow='auto';}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
